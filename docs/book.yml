# Self-hosted docs for marimo-book — built with marimo-book.
#
# This book is both the reference for the tool and a working example of
# every feature it ships. Browse it live, then read the .md source in
# this directory to see exactly how each page is authored.

title: marimo-book
description: A Jupyter-Book-style static site generator for marimo notebooks.
authors:
  - name: Luke Chang
    affiliation: Dartmouth College
copyright: "2026"
license: MIT
repo: https://github.com/ljchang/marimo-book
branch: main
url: https://ljchang.github.io/marimo-book/

theme:
  palette:
    primary: "#6366f1"   # indigo 500 — muted violet accent
    accent:  "#818cf8"   # indigo 400
  font:
    text: Geist
    code: Geist Mono

launch_buttons:
  molab: true
  github: true
  download: true

dependencies:
  mode: env  # we ship the docs in the same env that runs marimo-book

# Auto-generated OpenGraph / Twitter preview card per page. Requires
# `pip install 'marimo-book[social]'` — which our CI does — and bundles
# cairosvg + Pillow for rasterising the Material template.
social_cards: true

# Resolve cross-page heading references. Lets us write `[Anywidgets][]`
# and have it auto-link to whatever page has that heading. Requires
# `pip install 'marimo-book[autorefs]'`.
cross_references: true

# Auto-include the repo-root CHANGELOG.md as a "Changelog" page in the
# nav. Single source of truth — the file you maintain for PyPI also
# becomes a docs page, so readers can browse release history in-book.
include_changelog: true

toc:
  - file: content/index.md

  - section: Getting Started
    children:
      - file: content/quickstart.md
      - file: content/book_yml.md

  - section: Authoring
    children:
      - file: content/authoring.md
      - file: content/example.py
      - file: content/dependencies.md
      - file: content/widgets.md

  - section: Publishing
    children:
      - file: content/deploying.md
      - file: content/link_checks.md

  - section: Project
    children:
      - file: content/roadmap.md
      - file: content/inspiration.md
      - url: https://github.com/ljchang/marimo-book
        title: GitHub Repository
